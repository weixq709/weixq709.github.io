no-icon link" href="/blog/categories/?id=e778d6" data-v-42a89382 data-v-e3316979><!--[-->后端<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-42a89382><span class="icon vpi-tag" data-v-42a89382></span><!--[--><a class="vp-link no-icon link tag vp-tag-zcch" href="/blog/tags/?tag=java" data-v-42a89382 data-v-e3316979><!--[-->java<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-a8we" href="/blog/tags/?tag=springboot" data-v-42a89382 data-v-e3316979><!--[-->springboot<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-by4i" href="/blog/tags/?tag=quartz" data-v-42a89382 data-v-e3316979><!--[-->quartz<!--]--><!----></a><!--]--></div><div class="create-time" data-v-42a89382><span class="icon vpi-clock" data-v-42a89382></span><span data-v-42a89382>2024-10-08</span></div></div><!----></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-8094c08a data-v-42a89382><!----><div class="blog-post-item-content" data-v-42a89382><h3 data-v-42a89382><!----><!----><a class="vp-link no-icon link" href="/article/be2kfu0e/" data-v-42a89382 data-v-e3316979><!--[-->调用链抽象及节点支持自动注入<!--]--><!----></a></h3><div class="post-meta" data-v-42a89382><div class="category-list" data-v-42a89382><span class="icon vpi-folder" data-v-42a89382></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e778d6" data-v-42a89382 data-v-e3316979><!--[-->后端<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-42a89382><span class="icon vpi-clock" data-v-42a89382></span><span data-v-42a89382>2025-02-08</span></div></div><div class="vp-doc excerpt" data-v-42a89382><p>大部分系统中，可能都会用到调用链模式，并且同时存在多个调用链。我们希望在使用时，可以自动完成调用链路的构建以及支持自动注入，从而减少代码的冗余，提高开发效率。本文将说明如何利用<code v-pre>Spring</code>扩展点，实现调用链的抽象及节点自动注入。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-8094c08a data-v-42a89382><!----><div class="blog-post-item-content" data-v-42a89382><h3 data-v-42a89382><!----><!----><a class="vp-link no-icon link" href="/article/g8747vh2/" data-v-42a89382 data-v-e3316979><!--[-->spring异步切面支持<!--]--><!----></a></h3><div class="post-meta" data-v-42a89382><div class="category-list" data-v-42a89382><span class="icon vpi-folder" data-v-42a89382></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e778d6" data-v-42a89382 data-v-e3316979><!--[-->后端<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-42a89382><span class="icon vpi-clock" data-v-42a89382></span><span data-v-42a89382>2025-01-20</span></div></div><div class="vp-doc excerpt" data-v-42a89382><p>某些场景下，我们希望异步执行业务方法，比如发送短信、邮件等，避免阻塞主线程，提高系统的吞吐量。本文将介绍，如何自定义注解实现类似<code v-pre>@Async</code>的功能，并解决异步切面中无法使用除环绕通知的其他通知类型的问题。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-8094c08a data-v-42a89382><!----><div class="blog-post-item-content" data-v-42a89382><h3 data-v-42a89382><!----><!----><a class="vp-link no-icon link" href="/article/5fo75ulk/" data-v-42a89382 data-v-e3316979><!--[-->Spring单元测试日志断言<!--]--><!----></a></h3><div class="post-meta" data-v-42a89382><div class="category-list" data-v-42a89382><span class="icon vpi-folder" data-v-42a89382></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e778d6" data-v-42a89382 data-v-e3316979><!--[-->后端<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-42a89382><span class="icon vpi-tag" data-v-42a89382></span><!--[--><a class="vp-link no-icon link tag vp-tag-k8lg" href="/blog/tags/?tag=spring" data-v-42a89382 data-v-e3316979><!--[-->spring<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-nvwo" href="/blog/tags/?tag=单元测试" data-v-42a89382 data-v-e3316979><!--[-->单元测试<!--]--><!----></a><!--]--></div><div class="create-time" data-v-42a89382><span class="icon vpi-clock" data-v-42a89382></span><span data-v-42a89382>2024-12-22</span></div></div><div class="vp-doc excerpt" data-v-42a89382><p>在使用<code v-pre>springboot test</code>做单元测试时，我们需要根据输出的日志内容进行断言。但是，<code v-pre>spring</code>并没有直接提供可用的方式，本文将介绍如何在<code v-pre>spring</code>单元测试中根据日志输出内容进行断言。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-8094c08a data-v-42a89382><!----><div class="blog-post-item-content" data-v-42a89382><h3 data-v-42a89382><!----><!----><a class="vp-link no-icon link" href="/article/8kykzwya/" data-v-42a89382 data-v-e3316979><!--[-->springboot解析yaml配置文件<!--]--><!----></a></h3><div class="post-meta" data-v-42a89382><div class="category-list" data-v-42a89382><span class="icon vpi-folder" data-v-42a89382></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e778d6" data-v-42a89382 data-v-e3316979><!--[-->后端<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-42a89382><span class="icon vpi-clock" data-v-42a89382></span><span data-v-42a89382>2024-10-09</span></div></div><div class="vp-doc excerpt" data-v-42a89382>在 Spring Boot 中，YAML 配置文件提供了一种结构化的方式来管理应用配置。使用 .yml 或 .yaml 文件，开发者可以定义层次化的配置，如数据库连接和自定义属性。Spring Boot 自动加载 application.yml 文件，并通过 @ConfigurationProperties 注解将配置映射到 Java 对象上，提升可读性并减少配置错误，非常适合大型应用。</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-8094c08a data-v-42a89382><!----><div class="blog-post-item-content" data-v-42a89382><h3 data-v-42a89382><!----><!----><a class="vp-link no-icon link" href="/article/sc2xk8dy/" data-v-42a89382 data-v-e3316979><!--[-->Markdown<!--]--><!----></a></h3><div class="post-meta" data-v-42a89382><div class="category-list" data-v-42a89382><span class="icon vpi-folder" data-v-42a89382></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=0d98c7" data-v-42a89382 data-v-e3316979><!--[-->其他<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-42a89382><span class="icon vpi-tag" data-v-42a89382></span><!--[--><a class="vp-link no-icon link tag vp-tag-rf0g" href="/blog/tags/?tag=markdown" data-v-42a89382 data-v-e3316979><!--[-->markdown<!--]--><!----></a><!--]--></div><div class="create-time" data-v-42a
